[defaults]
action = "passthrough"
timeout = 60
timeout_action = "deny"
voice = false
audit = false

[[rules]]
name = "Block: rm -rf /"
tool = "Bash"
pattern = 'rm\s+(-[a-zA-Z]*f[a-zA-Z]*\s+|(-[a-zA-Z]*\s+)*)[/~]'
action = "deny"
reason = "Recursive delete of system paths"
risk = "critical"

[[rules]]
name = "Gate: force push"
tool = "Bash"
pattern = 'git\s+push\s+.*--force'
action = "gate"
reason = "Force push rewrites remote history"
risk = "high"

[[rules]]
name = "Gate: npm install"
tool = "Bash"
pattern = '(npm|yarn|pnpm|bun)\s+(install|add|i\b)'
action = "gate"
reason = "Installing packages pulls third-party code"
risk = "medium"
grace_period = 300

[[rules]]
name = "Gate: env files"
tool = "Write"
path_pattern = '\.env'
action = "gate"
reason = "Writing to environment files"
risk = "high"

[[rules]]
name = "Gate: ssh config"
tool = "Edit"
path_pattern = '\.ssh/'
action = "gate"
reason = "Modifying SSH configuration"
risk = "high"

# Wildcard MCP rules for testing
[[rules]]
name = "Gate: browser automation"
tool = "mcp__claude-in-chrome__*"
action = "gate"
reason = "Browser automation requires approval"
risk = "high"

[[rules]]
name = "Gate: Obsidian writes"
tool = "mcp__obsidian__*"
pattern = '(write_note|delete_note|patch_note)'
action = "gate"
reason = "Modifying Obsidian vault"
risk = "medium"

[[rules]]
name = "Gate: all filesystem MCP"
tool = "mcp__filesystem__*"
action = "gate"
reason = "Filesystem MCP access"
risk = "high"

[[rules]]
name = "Gate: exact MCP tool"
tool = "mcp__slack__send_message"
action = "gate"
reason = "Sending Slack messages"
risk = "high"

[[rules]]
name = "Gate: background agents"
tool = "Agent"
pattern = '"run_in_background"\s*:\s*true'
action = "gate"
reason = "Background agent execution"
risk = "medium"
