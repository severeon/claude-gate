name: Claude Code Review

on:
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  review:
    runs-on: self-hosted
    timeout-minutes: 30

    permissions:
      contents: read
      pull-requests: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Claude Code Review
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          # Get the diff for this PR
          git diff origin/main...HEAD > /tmp/pr-diff.txt

          # Run claude with the review prompt
          claude --print -m "You are reviewing a PR for claude-gate, a macOS Swift CLI that gates Claude Code tool calls behind Touch ID authentication. Review the diff below for:
          1. Security issues (this is a security tool — correctness is critical)
          2. Swift/AppKit correctness (thread safety, memory, lifecycle)
          3. Hook contract compliance (exit codes, JSON format per Claude Code docs)
          4. Rule pattern correctness (regex escaping, false positives/negatives)
          5. Edge cases in the gate flow (window close during auth, timeout, double output)

          Be specific. Reference file:line. Only flag real issues, not style preferences.

          $(cat /tmp/pr-diff.txt)" 2>&1 | tee /tmp/claude-review.txt

          # Post review as PR comment
          gh pr comment ${{ github.event.pull_request.number }} --body "## Claude Code Review

          $(cat /tmp/claude-review.txt)"
