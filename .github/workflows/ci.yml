name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: self-hosted

    steps:
      - uses: actions/checkout@v4

      - name: Build (debug)
        run: swift build 2>&1

      - name: Build (release)
        run: swift build --configuration release 2>&1

      - name: Test rule engine
        run: |
          # Seed config for tests
          mkdir -p ~/.config/claude-gate
          cp Config/default-rules.toml ~/.config/claude-gate/rules.toml

          BINARY=".build/debug/claude-gate"

          echo "--- Test: passthrough (safe command) ---"
          RESULT=$(echo '{"tool_name":"Bash","tool_input":{"command":"ls -la"}}' | $BINARY 2>/dev/null)
          echo "$RESULT" | python3 -c "import sys,json; d=json.load(sys.stdin); assert d['hookSpecificOutput']['permissionDecision'] == 'allow', f'Expected allow, got {d}'"
          echo "PASS: passthrough"

          echo "--- Test: deny (rm -rf /) ---"
          RESULT=$(echo '{"tool_name":"Bash","tool_input":{"command":"rm -rf /"}}' | $BINARY 2>/dev/null)
          echo "$RESULT" | python3 -c "import sys,json; d=json.load(sys.stdin); assert d['hookSpecificOutput']['permissionDecision'] == 'deny', f'Expected deny, got {d}'"
          echo "PASS: deny rm -rf /"

          echo "--- Test: deny (mkfs) ---"
          RESULT=$(echo '{"tool_name":"Bash","tool_input":{"command":"mkfs.ext4 /dev/sda1"}}' | $BINARY 2>/dev/null)
          echo "$RESULT" | python3 -c "import sys,json; d=json.load(sys.stdin); assert d['hookSpecificOutput']['permissionDecision'] == 'deny', f'Expected deny, got {d}'"
          echo "PASS: deny mkfs"

          echo "--- Test: deny (fork bomb) ---"
          RESULT=$(echo '{"tool_name":"Bash","tool_input":{"command":":(){ :|:& };:"}}' | $BINARY 2>/dev/null)
          echo "$RESULT" | python3 -c "import sys,json; d=json.load(sys.stdin); assert d['hookSpecificOutput']['permissionDecision'] == 'deny', f'Expected deny, got {d}'"
          echo "PASS: deny fork bomb"

          echo "--- Test: fail-closed (bad JSON) ---"
          RESULT=$(echo 'not json' | $BINARY 2>/dev/null || true)
          echo "$RESULT" | python3 -c "import sys,json; d=json.load(sys.stdin); assert d['hookSpecificOutput']['permissionDecision'] == 'deny', f'Expected deny, got {d}'"
          echo "PASS: fail-closed on bad input"

          echo "--- Test: passthrough (safe Write) ---"
          RESULT=$(echo '{"tool_name":"Write","tool_input":{"file_path":"src/app.ts","content":"hello"}}' | $BINARY 2>/dev/null)
          echo "$RESULT" | python3 -c "import sys,json; d=json.load(sys.stdin); assert d['hookSpecificOutput']['permissionDecision'] == 'allow', f'Expected allow, got {d}'"
          echo "PASS: passthrough Write"

          echo "--- Test: custom timeout config ---"
          cat > ~/.config/claude-gate/rules.toml << 'TOML'
          [defaults]
          action = "passthrough"
          timeout = 30
          timeout_action = "deny"

          [[rules]]
          name = "Block: system destruction"
          tool = "Bash"
          pattern = 'rm\s+(-[a-zA-Z]*f[a-zA-Z]*\s+|(-[a-zA-Z]*\s+)*)[/~]'
          action = "deny"
          reason = "Blocked"
          risk = "critical"
          TOML

          RESULT=$(echo '{"tool_name":"Bash","tool_input":{"command":"ls -la"}}' | $BINARY 2>/dev/null)
          echo "$RESULT" | python3 -c "import sys,json; d=json.load(sys.stdin); assert d['hookSpecificOutput']['permissionDecision'] == 'allow', f'Expected allow, got {d}'"
          echo "PASS: custom timeout config accepted"

          # Restore default config
          cp Config/default-rules.toml ~/.config/claude-gate/rules.toml

          echo "--- Test: audit log ---"
          rm -f ~/.config/claude-gate/audit.jsonl
          echo '{"tool_name":"Bash","tool_input":{"command":"ls -la"}}' | $BINARY 2>/dev/null > /dev/null
          echo '{"tool_name":"Bash","tool_input":{"command":"rm -rf /"}}' | $BINARY 2>/dev/null > /dev/null
          python3 -c "
          import json
          with open('$HOME/.config/claude-gate/audit.jsonl') as f:
              lines = [json.loads(l) for l in f if l.strip()]
          assert len(lines) == 2, f'Expected 2 audit entries, got {len(lines)}'
          assert lines[0]['decision'] == 'allow', f'Expected allow, got {lines[0]}'
          assert lines[1]['decision'] == 'deny', f'Expected deny, got {lines[1]}'
          assert lines[1]['rule_name'] is not None, 'Expected rule_name in deny entry'
          assert 'timestamp' in lines[0], 'Expected timestamp field'
          "
          echo "PASS: audit log entries written correctly"

          echo ""
          echo "All tests passed!"
